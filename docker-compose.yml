services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - sqlite_data:/app/backend/data
      - static_files:/app/backend/staticfiles
      - media_files:/app/backend/media
    environment:
      - DJANGO_SETTINGS_MODULE=exam_site.settings
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  sqlite_data:
  static_files:
  media_files:
